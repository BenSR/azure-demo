name: "Infra — Core — Prod Apply"

# Runs on merge to main. Plan is saved to blob storage, a reviewer approves,
# then the exact reviewed plan is applied.

on:
  push:
    branches: [main]
    paths:
      - "terraform/phase1/core/**"
      - "terraform/modules/**"
      - ".github/workflows/infra-core-prod.yml"

concurrency:
  group: "infra-core-prod"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: "terraform/phase1/core"
  ARM_USE_OIDC: "true"
  TF_VERSION: "~1.7"

jobs:
  plan:
    name: "Plan"
    runs-on: ubuntu-latest
    outputs:
      plan-key: ${{ steps.set-key.outputs.key }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-core.tfstate"

      - name: "Terraform plan"
        run: |
          set -o pipefail
          terraform -chdir=${{ env.TF_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="runner_management_pat=${{ secrets.RUNNER_MANAGEMENT_PAT }}" \
            -var="runner_script_sas_url=${{ secrets.RUNNER_SCRIPT_SAS_URL }}" \
            -out=/tmp/tfplan-core \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## Core Plan — production"
            echo ""
            echo "> [!IMPORTANT]"
            echo "> Review the plan, then approve the **Await approval** job to apply."
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`core-${{ github.run_id }}.tfplan\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Set plan blob key"
        id: set-key
        run: echo "key=core-${{ github.run_id }}.tfplan" >> "$GITHUB_OUTPUT"

      - name: "Upload plan to blob storage"
        run: |
          az storage blob upload \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "core-${{ github.run_id }}.tfplan" \
            --file /tmp/tfplan-core \
            --auth-mode login \
            --overwrite

  approve:
    name: "Await approval"
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - run: echo "Approved by ${{ github.actor }}."

  apply:
    name: "Apply"
    needs: [plan, approve]
    runs-on: ubuntu-latest
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-core.tfstate"

      - name: "Download plan from blob storage"
        run: |
          az storage blob download \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "${{ needs.plan.outputs.plan-key }}" \
            --file /tmp/tfplan-core \
            --auth-mode login

      - name: "Terraform apply"
        run: |
          set -o pipefail
          terraform -chdir=${{ env.TF_ROOT }} apply \
            -no-color \
            /tmp/tfplan-core 2>&1 | tee /tmp/apply-output.txt

          {
            echo "## Core Apply — production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`${{ needs.plan.outputs.plan-key }}\` |"
            echo "| Applied by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -40 /tmp/apply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
