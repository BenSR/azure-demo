name: "Infra — Validate"

# Runs on every PR to dev/main and on feature branch pushes.
# No Azure credentials required.

on:
  push:
    branches: ["feature/**"]
    paths:
      - "terraform/**"
      - ".github/workflows/infra-*.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "terraform/**"
      - ".github/workflows/infra-*.yml"

concurrency:
  group: "infra-validate-${{ github.ref_name }}-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_VERSION: "~1.7"

jobs:
  validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "terraform fmt check"
        run: terraform fmt -check -recursive terraform/

      - name: "Setup TFLint"
        uses: terraform-linters/setup-tflint@v4

      - name: "TFLint — init"
        run: tflint --init --config="$(pwd)/.tflint.hcl"

      - name: "TFLint — lint"
        run: tflint --recursive --config="$(pwd)/.tflint.hcl"

      - name: "terraform validate — phase1/core"
        run: |
          terraform -chdir=terraform/phase1/core init -backend=false
          terraform -chdir=terraform/phase1/core validate

      - name: "terraform validate — phase1/env"
        run: |
          terraform -chdir=terraform/phase1/env init -backend=false
          terraform -chdir=terraform/phase1/env validate

      - name: "terraform validate — phase3/env"
        run: |
          terraform -chdir=terraform/phase3/env init -backend=false
          terraform -chdir=terraform/phase3/env validate

      - name: "terraform test — modules/vnet"
        run: |
          terraform -chdir=terraform/modules/vnet init -backend=false
          terraform -chdir=terraform/modules/vnet test

      - name: "terraform test — modules/private-dns"
        run: |
          terraform -chdir=terraform/modules/private-dns init -backend=false
          terraform -chdir=terraform/modules/private-dns test

      - name: "terraform test — modules/workload-stamp-subnet"
        run: |
          terraform -chdir=terraform/modules/workload-stamp-subnet init -backend=false
          terraform -chdir=terraform/modules/workload-stamp-subnet test

      - name: "terraform test — modules/workload-stamp"
        run: |
          terraform -chdir=terraform/modules/workload-stamp init -backend=false
          terraform -chdir=terraform/modules/workload-stamp test
