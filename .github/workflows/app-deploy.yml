# ─────────────────────────────────────────────────────────────────────────────
# Pipeline 3 — Application Code (function_app)
#
# Builds and deploys the containerised Azure Function App. ACR has public
# network access disabled — all Docker operations run on the VNet-injected
# runner. The Kudu webhook URL is stored in each stamp's Key Vault and
# retrieved at deploy time by the VNet runner, which is the only runner that
# can reach the private KV data plane.
#
# ┌─────────────┬──────────────────────────────────────────────────────────────┐
# │ Trigger     │ Behaviour                                                    │
# ├─────────────┼──────────────────────────────────────────────────────────────┤
# │ PR → dev    │ Test (public runner) + Docker build validate (VNet runner,   │
# │             │ no push)                                                     │
# │ PR → main   │ Same as PR → dev                                             │
# │ Push → dev  │ Test → build + push :dev → deploy all dev stamps             │
# │ Push → main │ Test → build + push :latest → await approval → deploy all    │
# │             │ prod stamps                                                  │
# └─────────────┴──────────────────────────────────────────────────────────────┘
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   ARM_CLIENT_ID          — Service principal / managed identity client ID
#   ARM_TENANT_ID          — Azure Active Directory tenant ID
#   ARM_SUBSCRIPTION_ID    — Azure subscription ID
#
# Required GitHub environments (Settings → Environments):
#   dev  — No reviewers needed; used for audit trail on dev auto-deploys
#   prod — Configure required reviewers; approval gate for production deploy
#
# VNet runner label:
#   Jobs that run on the VNet runner use: [self-hosted, linux, azure-vnet]
#   Update this label to match your registered self-hosted runner's labels.
#   The runner must be in the snet-runner subnet of vnet-core.
# ─────────────────────────────────────────────────────────────────────────────
name: "App — Deploy (Function App)"

on:
  push:
    branches: [dev, main]
    paths:
      - "function_app/**"
      - ".github/workflows/app-deploy.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "function_app/**"
      - ".github/workflows/app-deploy.yml"

# One run at a time per branch. Unlike infra, cancelling a superseded code
# build is safe — the webhook is fire-and-forget and there is no apply state
# to protect. cancel-in-progress ensures the latest commit is always the one
# that gets built and deployed.
concurrency:
  group: "app-deploy-${{ github.ref_name }}"
  cancel-in-progress: true

permissions:
  id-token: write  # Required for OIDC token exchange with Azure
  contents: read

env:
  ACR_NAME: "acrcore"
  IMAGE_REPO: "wkld-api"
  # Space-separated stamp numbers per environment.
  # Update when stamps are added or removed (must match terraform .tfvars).
  DEV_STAMPS: "1 2"
  PROD_STAMPS: "1"
  PYTHON_VERSION: "3.11"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PULL REQUEST — validate only, no push
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Test (PR) ─────────────────────────────────────────────────────────────
  # Public runner. No Azure credentials required.
  # Failures block the PR from merging.
  test-pr:
    name: "Test"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: function_app
    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: function_app/requirements.txt

      - name: "Install dependencies"
        run: pip install -r requirements.txt pytest pytest-cov

      - name: "Run tests with coverage"
        run: |
          pytest tests/ -v \
            --cov=function_app \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            2>&1 | tee /tmp/test-output.txt

          {
            echo "## Test Results — PR"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Branch | \`${{ github.head_ref }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            cat /tmp/test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Docker build validate (PR) ────────────────────────────────────────────
  # VNet runner mirrors the runner used for the actual push — catches build
  # issues before they reach dev. Image is discarded; no push occurs.
  # Runs concurrently with test-pr; both must pass for the PR to be mergeable.
  build-check-pr:
    name: "Docker build (validate)"
    runs-on: [self-hosted, linux, azure-vnet]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: "Docker build (no push)"
        run: |
          docker build \
            --tag "${{ env.IMAGE_REPO }}:ci" \
            ./function_app
          echo "Build succeeded — image not pushed (PR validate only)."

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV BRANCH — test → build → push :dev → deploy
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Test (dev push) ───────────────────────────────────────────────────────
  # Public runner. Test failures prevent a broken image from being pushed.
  test-dev:
    name: "Test"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    defaults:
      run:
        working-directory: function_app
    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: function_app/requirements.txt

      - name: "Install dependencies"
        run: pip install -r requirements.txt pytest pytest-cov

      - name: "Run tests with coverage"
        run: |
          pytest tests/ -v \
            --cov=function_app \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            2>&1 | tee /tmp/test-output.txt

          {
            echo "## Test Results — \`dev\`"
            echo ""
            echo '```'
            cat /tmp/test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build, push & deploy (dev) ────────────────────────────────────────────
  # VNet runner — ACR public access is disabled; Docker operations must run
  # inside the VNet. Pushes :dev tag, then reads deploy-webhook-url from each
  # stamp's Key Vault and POSTs to trigger a container pull and atomic restart.
  # Skipped automatically if test-dev fails.
  build-push-deploy-dev:
    name: "Build, Push & Deploy (dev)"
    runs-on: [self-hosted, linux, azure-vnet]
    needs: test-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "ACR login"
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: "Docker build & push (:dev)"
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:dev"
          docker build --tag "$IMAGE" ./function_app
          docker push "$IMAGE"
          echo "Pushed: $IMAGE"

      - name: "Deploy to dev stamps"
        # Iterates over DEV_STAMPS. Each stamp's webhook URL is stored in its
        # own Key Vault as 'deploy-webhook-url'. The VNet runner is the only
        # runner that can reach the private KV data plane and the SCM endpoint.
        run: |
          for N in ${{ env.DEV_STAMPS }}; do
            KV="kv-wkld-${N}-dev"
            echo "Triggering deploy webhook for stamp ${N} (${KV})..."
            WEBHOOK=$(az keyvault secret show \
              --vault-name "$KV" \
              --name deploy-webhook-url \
              --query value \
              --output tsv)
            curl --silent --show-error --fail --max-time 30 -X POST "$WEBHOOK"
            echo "Stamp ${N}: webhook accepted."
          done

      - name: "Deploy summary"
        if: always()
        run: |
          {
            echo "## App Deploy — \`dev\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:dev\` |"
            echo "| Stamps | \`${{ env.DEV_STAMPS }}\` |"
            echo "| Deployed by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # MAIN BRANCH — test → build → push :latest → approve → deploy
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Test (main push) ──────────────────────────────────────────────────────
  # Public runner. Same gate as dev — test failures prevent the image push.
  test-prod:
    name: "Test"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: function_app
    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: function_app/requirements.txt

      - name: "Install dependencies"
        run: pip install -r requirements.txt pytest pytest-cov

      - name: "Run tests with coverage"
        run: |
          pytest tests/ -v \
            --cov=function_app \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            2>&1 | tee /tmp/test-output.txt

          {
            echo "## Test Results — production"
            echo ""
            echo '```'
            cat /tmp/test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build & push :latest (pre-approval) ───────────────────────────────────
  # VNet runner. The image is pushed before the approval gate so that the
  # reviewer can inspect it in ACR as part of their approval decision:
  #   az acr repository show-tags --name acrcore --repository wkld-api \
  #     --orderby time_desc --output tsv
  # If approval is rejected, the image sits in ACR unused; the running prod
  # environment is unaffected (the Function App only pulls when the webhook
  # fires).
  build-push-prod:
    name: "Build & Push (pre-approval)"
    runs-on: [self-hosted, linux, azure-vnet]
    needs: test-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "ACR login"
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: "Docker build & push (:latest)"
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:latest"
          docker build --tag "$IMAGE" ./function_app
          docker push "$IMAGE"
          echo "Pushed: $IMAGE"

      - name: "Build summary"
        run: |
          {
            echo "## App Build — production (pre-approval)"
            echo ""
            echo "> [!IMPORTANT]"
            echo "> Review the image before approving the **Await approval** job:"
            echo "> \`az acr repository show-tags --name ${{ env.ACR_NAME }} --repository ${{ env.IMAGE_REPO }} --orderby time_desc --output tsv\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:latest\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Await approval ────────────────────────────────────────────────────────
  # Pauses here until a reviewer with access to the 'prod' environment
  # approves. Reviewer: check that tests passed, inspect the pushed image in
  # ACR (see build summary above), then approve or reject this job.
  #
  # The same 'prod' environment is shared with the infra pipeline — reviewers
  # configured there also gate code deploys.
  #
  # Configure required reviewers at:
  #   GitHub → Settings → Environments → prod → Required reviewers
  approve-prod:
    name: "Await approval"
    needs: build-push-prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: "Approved"
        run: echo "Production deploy approved by ${{ github.actor }} — proceeding."

  # ── Deploy (prod) ─────────────────────────────────────────────────────────
  # VNet runner — Key Vault data plane is private and unreachable from public
  # runners. Reads deploy-webhook-url from each stamp's Key Vault and POSTs to
  # trigger a container pull and atomic restart of the Function App.
  deploy-prod:
    name: "Deploy (prod)"
    needs: approve-prod
    runs-on: [self-hosted, linux, azure-vnet]
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Deploy to prod stamps"
        run: |
          for N in ${{ env.PROD_STAMPS }}; do
            KV="kv-wkld-${N}-prod"
            echo "Triggering deploy webhook for stamp ${N} (${KV})..."
            WEBHOOK=$(az keyvault secret show \
              --vault-name "$KV" \
              --name deploy-webhook-url \
              --query value \
              --output tsv)
            curl --silent --show-error --fail --max-time 30 -X POST "$WEBHOOK"
            echo "Stamp ${N}: webhook accepted."
          done

      - name: "Deploy summary"
        if: always()
        run: |
          {
            echo "## App Deploy — production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_REPO }}:latest\` |"
            echo "| Stamps | \`${{ env.PROD_STAMPS }}\` |"
            echo "| Deployed by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
