# ─────────────────────────────────────────────────────────────────────────────
# Pipeline 1 — Core Infrastructure (phase1/core)
#
# Deploys the shared, environment-agnostic foundation: VNet, ACR, Log Analytics,
# NAT Gateway, jump box, Private DNS zones, and stamp subnets for all envs.
# Core is deployed ONCE — no workspaces, no dev/prod split.
#
# ┌─────────────┬──────────────────────────────────────────────────────────┐
# │ Trigger             │ Behaviour                                        │
# ├─────────────────────┼──────────────────────────────────────────────────┤
# │ Push → feature/*    │ Lint + validate (public runner, no credentials)  │
# │ PR → dev            │ Lint + validate (public runner, no credentials)  │
# │ PR → main           │ Lint + validate (public runner, no credentials)  │
# │ PR merge → dev      │ Plan only — core has no dev workspace            │
# │ PR merge → main     │ Plan → upload plan → await approval → apply      │
# └─────────────┴──────────────────────────────────────────────────────────┘
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   ARM_CLIENT_ID          — Service principal / managed identity client ID
#   ARM_TENANT_ID          — Azure Active Directory tenant ID
#   ARM_SUBSCRIPTION_ID    — Azure subscription ID
#   TF_STATE_STORAGE_ACCOUNT — Storage account name in rg-core-deploy
#                              that holds Terraform state
#
# Required GitHub environments (Settings → Environments):
#   dev  — No reviewers needed; used for audit trail on dev-branch plans
#   prod — Configure required reviewers; approval gate for production apply
# ─────────────────────────────────────────────────────────────────────────────
name: "Infra — Core (Phase 1)"

on:
  push:
    branches: [dev, main, "feature/**"]
    paths:
      - "terraform/phase1/core/**"
      - "terraform/modules/**"
      - ".github/workflows/infra-core.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "terraform/phase1/core/**"
      - "terraform/modules/**"
      - ".github/workflows/infra-core.yml"

# One run at a time per branch — never cancel an in-progress apply.
concurrency:
  group: "infra-core-${{ github.ref_name }}"
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC token exchange with Azure
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: "terraform/phase1/core"
  ARM_USE_OIDC: "true"
  # Terraform version pinned to match required_version in main.tf (~1.7).
  TF_VERSION: "~1.7"

jobs:
  # ── Lint & Validate ──────────────────────────────────────────────────────────
  # Runs on feature branch pushes and on every PR targeting dev or main.
  # No Azure credentials required. Failures block the PR from merging.
  validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/'))
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "terraform fmt check"
        run: terraform fmt -check -recursive terraform/

      - name: "Setup TFLint"
        uses: terraform-linters/setup-tflint@v4

      - name: "TFLint — init"
        run: tflint --init --config=.tflint.hcl

      - name: "TFLint — lint"
        run: tflint --recursive --config=.tflint.hcl

      - name: "terraform validate"
        # -backend=false skips backend auth so no credentials are needed here.
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init -backend=false
          terraform -chdir=${{ env.TF_ROOT }} validate

  # ── Plan (dev branch) ────────────────────────────────────────────────────────
  # Produces a plan against live core state on every merge to dev.
  # Core has no dev workspace — this targets the single shared state.
  # No apply: core is never auto-deployed.
  plan-dev:
    name: "Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-core.tfstate"

      - name: "Terraform plan"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## Core Infrastructure Plan — \`dev\` branch"
            echo ""
            echo "> [!NOTE]"
            echo "> Plan only — core is never auto-deployed. Merge to \`main\` to apply."
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Plan (main — pre-approval) ───────────────────────────────────────────────
  # Runs on merge to main. Saves the plan binary to blob storage so the apply
  # step uses the exact same plan that was reviewed — no drift risk.
  plan-prod:
    name: "Plan (pre-approval)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      plan-key: ${{ steps.set-key.outputs.key }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-core.tfstate"

      - name: "Terraform plan"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -out=/tmp/tfplan-core \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## Core Infrastructure Plan — production"
            echo ""
            echo "> [!IMPORTANT]"
            echo "> Review the plan below, then approve the **Await approval** job to apply."
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`core-${{ github.run_id }}.tfplan\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Set plan blob key"
        id: set-key
        run: echo "key=core-${{ github.run_id }}.tfplan" >> "$GITHUB_OUTPUT"

      - name: "Upload plan to blob storage"
        # Plan blobs are keyed by run ID. A lifecycle policy on the tfplans
        # container deletes blobs older than 30 days.
        run: |
          az storage blob upload \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "core-${{ github.run_id }}.tfplan" \
            --file /tmp/tfplan-core \
            --auth-mode login \
            --overwrite

  # ── Await approval ───────────────────────────────────────────────────────────
  # Pauses here until a reviewer with access to the 'prod' environment approves.
  # Reviewer: inspect the plan in the step summary of the 'Plan (pre-approval)'
  # job above, then approve or reject this job.
  #
  # Configure required reviewers at:
  #   GitHub → Settings → Environments → prod → Required reviewers
  approve-prod:
    name: "Await approval"
    needs: plan-prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: "Approved"
        run: echo "Plan approved by ${{ github.actor }} — proceeding to apply."

  # ── Apply (production) ───────────────────────────────────────────────────────
  # Downloads the exact binary plan that was reviewed. Applies it.
  # If the apply fails, fix the root cause and re-run from plan.
  apply-prod:
    name: "Apply"
    needs: [plan-prod, approve-prod]
    runs-on: ubuntu-latest
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        # Re-init on the apply runner to download providers matching the plan.
        run: |
          terraform -chdir=${{ env.TF_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-core.tfstate"

      - name: "Download plan from blob storage"
        run: |
          az storage blob download \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "${{ needs.plan-prod.outputs.plan-key }}" \
            --file /tmp/tfplan-core \
            --auth-mode login

      - name: "Terraform apply"
        run: |
          terraform -chdir=${{ env.TF_ROOT }} apply \
            -no-color \
            /tmp/tfplan-core 2>&1 | tee /tmp/apply-output.txt

          {
            echo "## Core Infrastructure Apply — production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`${{ needs.plan-prod.outputs.plan-key }}\` |"
            echo "| Applied by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -40 /tmp/apply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
