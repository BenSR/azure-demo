# ─────────────────────────────────────────────────────────────────────────────
# Pipeline 2 — Workload Infrastructure (phase1/env + phase3)
#
# Deploys the workspace-driven workload layer: APIM, App Service Plans, Function
# Apps, Storage, Key Vaults (phase1/env), then APIM config, mTLS secrets, and
# alert rules (phase3). Phase 3 MUST run on the VNet-injected runner because it
# reaches private Key Vault and APIM endpoints.
#
# ┌─────────────┬──────────────────────────────────────────────────────────────┐
# │ Trigger     │ Behaviour                                                    │
# ├─────────────┼──────────────────────────────────────────────────────────────┤
# │ PR → dev    │ Lint + validate phase1/env and phase3 (public runner, no     │
# │             │ credentials)                                                 │
# │ PR → main   │ Same as PR → dev                                             │
# │ Push → dev  │ Auto plan+apply phase1/env (public runner, workspace=dev),   │
# │             │ then auto plan+apply phase3 (VNet runner, workspace=dev)     │
# │ Push → main │ Plan phase1/env + phase3 (parallel) → upload plans →        │
# │             │ await approval → apply phase1/env → apply phase3             │
# └─────────────┴──────────────────────────────────────────────────────────────┘
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   ARM_CLIENT_ID            — Service principal / managed identity client ID
#   ARM_TENANT_ID            — Azure Active Directory tenant ID
#   ARM_SUBSCRIPTION_ID      — Azure subscription ID
#   TF_STATE_STORAGE_ACCOUNT — Storage account name in rg-core-deploy
#
# Required GitHub environments (Settings → Environments):
#   dev  — No reviewers needed; used for audit trail on dev auto-deploys
#   prod — Configure required reviewers; approval gate for production apply
#
# VNet runner label:
#   Jobs that run on the VNet runner use: [self-hosted, linux, azure-vnet]
#   Update this label to match your registered self-hosted runner's labels.
#   The runner must be in the snet-runner subnet of vnet-core.
# ─────────────────────────────────────────────────────────────────────────────
name: "Infra — Workload (Phase 1/env + Phase 3)"

on:
  push:
    branches: [dev, main]
    paths:
      - "terraform/phase1/env/**"
      - "terraform/phase3/**"
      - "terraform/modules/**"
      - ".github/workflows/infra-workload.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "terraform/phase1/env/**"
      - "terraform/phase3/**"
      - "terraform/modules/**"
      - ".github/workflows/infra-workload.yml"

# One run at a time per branch — never cancel an in-progress apply.
concurrency:
  group: "infra-workload-${{ github.ref_name }}"
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC token exchange with Azure
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  TF_VERSION: "~1.7"
  ENV_ROOT: "terraform/phase1/env"
  PH3_ROOT: "terraform/phase3"

jobs:
  # ── Lint & Validate ──────────────────────────────────────────────────────────
  # Runs on every PR against dev or main. No Azure credentials required.
  # Validates both phase1/env and phase3 so module changes are caught against
  # all consumers in a single pass.
  validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "terraform fmt check"
        run: terraform fmt -check -recursive terraform/

      - name: "Setup TFLint"
        uses: terraform-linters/setup-tflint@v4

      - name: "TFLint — init"
        run: tflint --init --config=.tflint.hcl

      - name: "TFLint — lint"
        run: tflint --recursive --config=.tflint.hcl

      - name: "terraform validate — phase1/env"
        # -backend=false skips backend auth; remote_state data sources are not
        # evaluated during validate so no credentials are needed.
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} init -backend=false
          terraform -chdir=${{ env.ENV_ROOT }} validate

      - name: "terraform validate — phase3"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} init -backend=false
          terraform -chdir=${{ env.PH3_ROOT }} validate

  # ═══════════════════════════════════════════════════════════════════════════
  # DEV BRANCH — auto plan + apply
  # ═══════════════════════════════════════════════════════════════════════════

  # ── phase1/env — plan + apply (dev) ─────────────────────────────────────────
  # Public runner. Low-friction: plan and apply run in a single job.
  # Failures here are caught before they can affect prod.
  plan-apply-env-dev:
    name: "phase1/env — Plan & Apply (dev)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-env.tfstate"

      - name: "Terraform workspace — dev"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} workspace select dev \
            || terraform -chdir=${{ env.ENV_ROOT }} workspace new dev

      - name: "Terraform plan"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var-file=dev.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -var="state_storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -out=/tmp/tfplan-env-dev \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## phase1/env Plan — \`dev\`"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Terraform apply"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} apply \
            -no-color \
            /tmp/tfplan-env-dev 2>&1 | tee /tmp/apply-output.txt

          {
            echo "## phase1/env Apply — \`dev\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Applied by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -30 /tmp/apply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── phase3 — plan + apply (dev) ──────────────────────────────────────────────
  # VNet runner — required to reach private Key Vault and APIM endpoints.
  # Runs after phase1/env apply completes; skipped if env-dev fails.
  plan-apply-phase3-dev:
    name: "phase3 — Plan & Apply (dev)"
    runs-on: [self-hosted, linux, azure-vnet]
    needs: plan-apply-env-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase3.tfstate"

      - name: "Terraform workspace — dev"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} workspace select dev \
            || terraform -chdir=${{ env.PH3_ROOT }} workspace new dev

      - name: "Terraform plan"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var-file=dev.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -var="state_storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -out=/tmp/tfplan-phase3-dev \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## phase3 Plan — \`dev\`"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Terraform apply"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} apply \
            -no-color \
            /tmp/tfplan-phase3-dev 2>&1 | tee /tmp/apply-output.txt

          {
            echo "## phase3 Apply — \`dev\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Applied by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -30 /tmp/apply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # MAIN BRANCH — plan → store → approve → apply
  # ═══════════════════════════════════════════════════════════════════════════

  # ── phase1/env — plan (prod) ─────────────────────────────────────────────────
  # Public runner. Produces a plan for reviewer inspection and uploads to blob
  # storage. Runs in parallel with plan-phase3-prod.
  plan-env-prod:
    name: "phase1/env — Plan (pre-approval)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      plan-key: ${{ steps.set-key.outputs.key }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-env.tfstate"

      - name: "Terraform workspace — prod"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} workspace select prod \
            || terraform -chdir=${{ env.ENV_ROOT }} workspace new prod

      - name: "Terraform plan"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var-file=prod.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -var="state_storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -out=/tmp/tfplan-env-prod \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## phase1/env Plan — production"
            echo ""
            echo "> [!IMPORTANT]"
            echo "> Review both plans (phase1/env and phase3), then approve the **Await approval** job."
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`env-prod-${{ github.run_id }}.tfplan\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Set plan blob key"
        id: set-key
        run: echo "key=env-prod-${{ github.run_id }}.tfplan" >> "$GITHUB_OUTPUT"

      - name: "Upload plan to blob storage"
        run: |
          az storage blob upload \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "env-prod-${{ github.run_id }}.tfplan" \
            --file /tmp/tfplan-env-prod \
            --auth-mode login \
            --overwrite

  # ── phase3 — plan (prod) ─────────────────────────────────────────────────────
  # VNet runner. Reads current phase1/env remote state (existing deployed state,
  # not the pending plan above). Runs in parallel with plan-env-prod.
  plan-phase3-prod:
    name: "phase3 — Plan (pre-approval)"
    runs-on: [self-hosted, linux, azure-vnet]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      plan-key: ${{ steps.set-key.outputs.key }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase3.tfstate"

      - name: "Terraform workspace — prod"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} workspace select prod \
            || terraform -chdir=${{ env.PH3_ROOT }} workspace new prod

      - name: "Terraform plan"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} plan \
            -var-file=terraform.tfvars \
            -var-file=prod.tfvars \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -var="state_storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -out=/tmp/tfplan-phase3-prod \
            -no-color 2>&1 | tee /tmp/plan-output.txt

          {
            echo "## phase3 Plan — production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`phase3-prod-${{ github.run_id }}.tfplan\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            cat /tmp/plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Set plan blob key"
        id: set-key
        run: echo "key=phase3-prod-${{ github.run_id }}.tfplan" >> "$GITHUB_OUTPUT"

      - name: "Upload plan to blob storage"
        run: |
          az storage blob upload \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "phase3-prod-${{ github.run_id }}.tfplan" \
            --file /tmp/tfplan-phase3-prod \
            --auth-mode login \
            --overwrite

  # ── Await approval ───────────────────────────────────────────────────────────
  # Waits for both plan jobs to complete, then pauses for a reviewer.
  # Reviewer: check the step summaries of both plan jobs above, then approve
  # or reject this job.
  approve-prod:
    name: "Await approval"
    needs: [plan-env-prod, plan-phase3-prod]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: "Approved"
        run: echo "Production deployment approved by ${{ github.actor }}."

  # ── phase1/env — apply (prod) ────────────────────────────────────────────────
  # Downloads the exact plan that was reviewed. Applies first — phase3 reads
  # phase1/env remote state and must run after env apply completes.
  apply-env-prod:
    name: "phase1/env — Apply"
    needs: [plan-env-prod, approve-prod]
    runs-on: ubuntu-latest
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase1-env.tfstate"

      - name: "Terraform workspace — prod"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} workspace select prod

      - name: "Download plan from blob storage"
        run: |
          az storage blob download \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "${{ needs.plan-env-prod.outputs.plan-key }}" \
            --file /tmp/tfplan-env-prod \
            --auth-mode login

      - name: "Terraform apply"
        run: |
          terraform -chdir=${{ env.ENV_ROOT }} apply \
            -no-color \
            /tmp/tfplan-env-prod 2>&1 | tee /tmp/apply-output.txt

          {
            echo "## phase1/env Apply — production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`${{ needs.plan-env-prod.outputs.plan-key }}\` |"
            echo "| Applied by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -40 /tmp/apply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── phase3 — apply (prod) ────────────────────────────────────────────────────
  # VNet runner. Runs after phase1/env apply so remote state is up to date.
  # Downloads and applies the pre-approved phase3 plan.
  apply-phase3-prod:
    name: "phase3 — Apply"
    needs: [plan-phase3-prod, apply-env-prod]
    runs-on: [self-hosted, linux, azure-vnet]
    environment: prod
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: "Azure login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Terraform init"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} init \
            -backend-config="resource_group_name=rg-core-deploy" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=phase3.tfstate"

      - name: "Terraform workspace — prod"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} workspace select prod

      - name: "Download plan from blob storage"
        run: |
          az storage blob download \
            --account-name "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --container-name "tfplans" \
            --name "${{ needs.plan-phase3-prod.outputs.plan-key }}" \
            --file /tmp/tfplan-phase3-prod \
            --auth-mode login

      - name: "Terraform apply"
        run: |
          terraform -chdir=${{ env.PH3_ROOT }} apply \
            -no-color \
            /tmp/tfplan-phase3-prod 2>&1 | tee /tmp/apply-output.txt

          {
            echo "## phase3 Apply — production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Plan key | \`${{ needs.plan-phase3-prod.outputs.plan-key }}\` |"
            echo "| Applied by | \`${{ github.actor }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -40 /tmp/apply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
